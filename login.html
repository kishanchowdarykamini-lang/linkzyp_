<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Linkzyp</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="/favicon-v2.png">

<style>

/* Page background */
body{
background:
radial-gradient(circle at 20% 20%, rgba(255,60,60,0.25), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(90,120,255,0.25), transparent 40%),
linear-gradient(135deg,#f7f8ff,#eef1ff);

min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* Brand title */
.brand-title{
font-size:38px;
font-weight:700;
margin-bottom:8px;
}

/* Product tagline */
.tagline{
color:#666;
margin-bottom:30px;
text-align:center;
max-width:400px;
}

/* Login card */
.login-card{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
padding:35px;
border-radius:14px;
box-shadow:0 25px 50px rgba(0,0,0,0.08);
border:1px solid rgba(255,255,255,0.4);
width:90%;
max-width:380px;
}

/* Inputs */
.login-card input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
background:#f1f3f9;
}

/* Login button */
.login-card button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff3b3b;
color:white;
font-weight:600;
cursor:pointer;
}

.login-card button:hover{
opacity:0.95;
}

/* Signup text */
.signup-link{
margin-top:16px;
font-size:14px;
}

.signup-link a{
color:#ff3b3b;
text-decoration:none;
font-weight:500;
}

</style>

</head>

<body class="login-page">

<div class="brand-title">
Linkzyp
</div>

<div class="tagline">
Save and organize your important links in one simple private space.
</div>

<div class="login-card">

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<div class="signup-link">
New user? <a href="index.html">Create Account</a>
</div>

</div>

<script src="login.js"></script>

</body>
</html>
